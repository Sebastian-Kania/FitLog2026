<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLog2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>💪 FitLog</h1>
        

        <main class="main-content">
            <section class="panel form-panel">
                <h2>Nový záznam tréninku</h2>
                <form id="fitness-form">

                    <div class="form-group">
                        <label for="vaha-uzivatele">Vaše váha (kg):</label>
                        <input type="number" id="vaha-uzivatele" value="80" min="30" max="250" required>
                    </div>

                    <div class="form-group">
                        <label for="vyber-aktivity">Vyberte aktivitu:</label>
                        <select id="vyber-aktivity" required>
                            <option value="">-- Zvolte sport --</option>
                            </select>
                    </div>

                    <div class="form-group" id="dynamicky-vstup-group">
                        <label id="dynamicky-label" for="dynamicky-vstup">Doba trvání (minuty):</label>
                        <input type="number" id="dynamicky-vstup" min="1" value="30" required>
                    </div>

                    <button type="submit" class="btn-primary">Přidat trénink do deníku</button>
                </form>
            </section>

            <section class="panel dashboard-panel">
                <div class="stats-bar">
                    <div class="stat-card">
                        <span class="stat-label">Celkem spáleno</span>
                        <span class="stat-value" id="celkem-kalorii">0 kcal</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Počet aktivit</span>
                        <span class="stat-value" id="pocet-aktivit">0</span>
                    </div>
                </div>

                <h2>Historie dnešních aktivit</h2>
                <div class="table-wrapper">
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th>Sport</th>
                                <th>Typ</th>
                                <th>Intenzita (MET)</th>
                                <th>Veličina</th>
                                <th>Spáleno</th>
                            </tr>
                        </thead>
                        <tbody id="vystup-zaznamu">
                            <tr id="prazdny-stav">
                                <td colspan="5" style="text-align: center; color: #6b7280; padding: 2rem;">
                                    Zatím jsi nepřidal žádný trénink. Formulář nahoře čeká!
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
